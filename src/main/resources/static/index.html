<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Chatbot</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 40px auto;
        }

        textarea {
            width: 100%;
            height: 80px;
        }

        button {
            margin-top: 10px;
            padding: 8px 16px;
        }

        pre {
            background: #f4f4f4;
            padding: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>Portfolio Chatbot</h1>

<textarea id="input" placeholder="Ask a question..."></textarea><br>
<button onclick="send()">Send</button>

<h3>Response</h3>
<pre id="output"></pre>

<script>
    async function send() {
        const input = document.getElementById("input").value;
        const output = document.getElementById("output");

        output.textContent = "Thinking...";

        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({userQuery: input})
        });

        const data = await res.json();
        output.textContent = data.response;
    }
</script>

</body>
</html>
